# Lakeflow Job — the orchestration DAG (exam domain 4 — M6).
# Flow: land delta -> run the declarative pipeline -> run DQ tests -> conditional branch
#       (on DQ failure: notify + stop; on success: publish/refresh the dashboard).
# Referenced by databricks.yml; deployed with `databricks bundle deploy`.
resources:
  jobs:
    insurance_ingest:
      name: insurance-ingest-${bundle.target}
      email_notifications:
        on_failure:
          - ${var.notification_email}
      # Data-driven trigger: kick off when new telematics files land (vs a cron schedule).
      trigger:
        file_arrival:
          url: /Volumes/${var.catalog}/landing/raw/telematics
      # schedule:                       # time-based alternative
      #   quartz_cron_expression: "0 0 6 * * ?"
      #   timezone_id: UTC

      tasks:
        - task_key: land_delta
          # TODO: create this notebook to upload/generate the next delta batch.
          notebook_task:
            notebook_path: ../notebooks/land_delta
          max_retries: 2
          min_retry_interval_millis: 60000

        - task_key: run_pipeline
          depends_on:
            - task_key: land_delta
          pipeline_task:
            pipeline_id: ${resources.pipelines.insurance_pipeline.id}

        - task_key: dq_tests
          depends_on:
            - task_key: run_pipeline
          # TODO: notebook that runs DQ assertions and sets a task value 'status' = PASS/FAIL.
          notebook_task:
            notebook_path: ../notebooks/dq_tests
          max_retries: 1

        - task_key: check_dq
          depends_on:
            - task_key: dq_tests
          condition_task:
            op: EQUAL_TO
            left: "{{tasks.dq_tests.values.status}}"
            right: "PASS"

        # runs only when check_dq is TRUE
        - task_key: publish_dashboard
          depends_on:
            - task_key: check_dq
              outcome: "true"
          # TODO: dashboard_task (refresh the AI/BI dashboard) — see M10.
          notebook_task:
            notebook_path: ../notebooks/publish_dashboard

        # runs only when check_dq is FALSE
        - task_key: notify_dq_failure
          depends_on:
            - task_key: check_dq
              outcome: "false"
          notebook_task:
            notebook_path: ../notebooks/notify_dq_failure
