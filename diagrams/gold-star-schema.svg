<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="1000" height="640" fill="#ffffff"/>
  <text x="500" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#1c2530">Gold Star Schema — Insurance Lakehouse</text>

  <!-- relationship lines (behind boxes) -->
  <g stroke="#9aa3ad" stroke-width="1.6">
    <line x1="500" y1="335" x2="240" y2="135"/>
    <line x1="500" y1="335" x2="760" y2="140"/>
    <line x1="500" y1="335" x2="240" y2="515"/>
    <line x1="500" y1="335" x2="760" y2="520"/>
    <line x1="500" y1="175" x2="500" y2="275" stroke-dasharray="4 3"/>
    <line x1="500" y1="395" x2="500" y2="490" stroke-dasharray="4 3"/>
  </g>

  <!-- dim_date (top-left) -->
  <g>
    <rect x="40" y="70" width="200" height="130" rx="8" fill="#ffffff" stroke="#3b7dd8" stroke-width="2"/>
    <rect x="40" y="70" width="200" height="26" rx="8" fill="#cfe0f5"/>
    <text x="140" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#1c2530">dim_date</text>
    <g font-size="12" fill="#26333f"><text x="54" y="116">date_key (PK)</text><text x="54" y="134">date</text><text x="54" y="152">year</text><text x="54" y="170">quarter</text><text x="54" y="188">month</text></g>
  </g>

  <!-- dim_customer (top-right) -->
  <g>
    <rect x="760" y="70" width="200" height="130" rx="8" fill="#ffffff" stroke="#3b7dd8" stroke-width="2"/>
    <rect x="760" y="70" width="200" height="26" rx="8" fill="#cfe0f5"/>
    <text x="860" y="88" text-anchor="middle" font-size="13" font-weight="700" fill="#1c2530">dim_customer</text>
    <g font-size="12" fill="#26333f"><text x="774" y="116">customer_id (PK)</text><text x="774" y="134">state</text><text x="774" y="152">region</text><text x="774" y="170">segment</text><text x="774" y="188">tenure_years</text></g>
  </g>

  <!-- dim_policy (bottom-left) -->
  <g>
    <rect x="40" y="445" width="200" height="130" rx="8" fill="#ffffff" stroke="#3b7dd8" stroke-width="2"/>
    <rect x="40" y="445" width="200" height="26" rx="8" fill="#cfe0f5"/>
    <text x="140" y="463" text-anchor="middle" font-size="13" font-weight="700" fill="#1c2530">dim_policy</text>
    <g font-size="12" fill="#26333f"><text x="54" y="491">policy_id (PK)</text><text x="54" y="509">product_line</text><text x="54" y="527">status</text><text x="54" y="545">sum_insured</text></g>
  </g>

  <!-- dim_agent (bottom-right) -->
  <g>
    <rect x="760" y="455" width="200" height="120" rx="8" fill="#ffffff" stroke="#3b7dd8" stroke-width="2"/>
    <rect x="760" y="455" width="200" height="26" rx="8" fill="#cfe0f5"/>
    <text x="860" y="473" text-anchor="middle" font-size="13" font-weight="700" fill="#1c2530">dim_agent (SCD2)</text>
    <g font-size="12" fill="#26333f"><text x="774" y="501">agent_id (PK)</text><text x="774" y="519">region</text><text x="774" y="537">is_current</text></g>
  </g>

  <!-- fact_premium (top-center) -->
  <g>
    <rect x="410" y="80" width="180" height="95" rx="8" fill="#ffffff" stroke="#c8a72b" stroke-width="2.5"/>
    <rect x="410" y="80" width="180" height="26" rx="8" fill="#faf0c8"/>
    <text x="500" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#1c2530">fact_premium</text>
    <g font-size="12" fill="#26333f"><text x="424" y="126">policy_id (FK)</text><text x="424" y="144">month_key (FK)</text><text x="424" y="162">earned_premium</text></g>
  </g>

  <!-- fact_claims (center) -->
  <g>
    <rect x="410" y="275" width="180" height="120" rx="8" fill="#ffffff" stroke="#c8a72b" stroke-width="3"/>
    <rect x="410" y="275" width="180" height="26" rx="8" fill="#faf0c8"/>
    <text x="500" y="293" text-anchor="middle" font-size="13" font-weight="700" fill="#1c2530">fact_claims</text>
    <g font-size="11.5" fill="#26333f"><text x="424" y="319">claim_id (PK)</text><text x="424" y="335">date_key · policy_id (FK)</text><text x="424" y="351">customer_id · agent_id (FK)</text><text x="424" y="367">loss_amount</text><text x="424" y="383">fraud_flag</text></g>
  </g>

  <!-- fact_payments (bottom-center) -->
  <g>
    <rect x="410" y="490" width="180" height="95" rx="8" fill="#ffffff" stroke="#c8a72b" stroke-width="2.5"/>
    <rect x="410" y="490" width="180" height="26" rx="8" fill="#faf0c8"/>
    <text x="500" y="508" text-anchor="middle" font-size="13" font-weight="700" fill="#1c2530">fact_payments</text>
    <g font-size="12" fill="#26333f"><text x="424" y="536">payment_id (PK)</text><text x="424" y="554">policy_id · date_key (FK)</text><text x="424" y="572">amount_due · amount_paid</text></g>
  </g>

  <text x="500" y="620" text-anchor="middle" font-size="11" fill="#6b7785">All three facts conform to dim_date and dim_policy; fact_claims additionally joins dim_customer and dim_agent.</text>
</svg>
