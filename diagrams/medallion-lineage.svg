<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 460" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1180" height="460" fill="#ffffff"/>
  <text x="590" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#1c2530">Medallion Lineage — Insurance Lakehouse</text>

  <!-- Generator -->
  <rect x="20" y="190" width="130" height="80" rx="10" fill="#eef7ee" stroke="#4a9a4a" stroke-width="2"/>
  <text x="85" y="222" text-anchor="middle" font-size="13" fill="#1c2530">Local Python</text>
  <text x="85" y="242" text-anchor="middle" font-size="13" font-weight="700" fill="#1c2530">data_generator</text>

  <!-- Volume with 7 source chips -->
  <rect x="210" y="60" width="190" height="330" rx="12" fill="#eaf2fb" stroke="#3b7dd8" stroke-width="2"/>
  <text x="305" y="84" text-anchor="middle" font-size="12" font-weight="700" fill="#1c2530">UC Volume</text>
  <text x="305" y="100" text-anchor="middle" font-size="11" fill="#3b5168">insurance.landing.raw</text>
  <g font-size="12" fill="#1c2530">
    <rect x="225" y="112" width="160" height="30" rx="6" fill="#ffffff" stroke="#9bbbe6"/><text x="305" y="131" text-anchor="middle">customers/*.csv</text>
    <rect x="225" y="150" width="160" height="30" rx="6" fill="#ffffff" stroke="#9bbbe6"/><text x="305" y="169" text-anchor="middle">policies/*.json</text>
    <rect x="225" y="188" width="160" height="30" rx="6" fill="#ffffff" stroke="#9bbbe6"/><text x="305" y="207" text-anchor="middle">claims/*.json</text>
    <rect x="225" y="226" width="160" height="30" rx="6" fill="#ffffff" stroke="#9bbbe6"/><text x="305" y="245" text-anchor="middle">payments/*.parquet</text>
    <rect x="225" y="264" width="160" height="30" rx="6" fill="#ffffff" stroke="#9bbbe6"/><text x="305" y="283" text-anchor="middle">agents/*.csv</text>
    <rect x="225" y="302" width="160" height="30" rx="6" fill="#ffffff" stroke="#9bbbe6"/><text x="305" y="321" text-anchor="middle">telematics/*.jsonl</text>
    <rect x="225" y="340" width="160" height="30" rx="6" fill="#ffffff" stroke="#9bbbe6"/><text x="305" y="359" text-anchor="middle">reference/*.csv</text>
  </g>

  <!-- Bronze / Silver / Gold / Dashboards -->
  <rect x="470" y="190" width="120" height="80" rx="10" fill="#f3e3d3" stroke="#b87333" stroke-width="2"/>
  <text x="530" y="224" text-anchor="middle" font-size="15" font-weight="700" fill="#1c2530">BRONZE</text>
  <text x="530" y="244" text-anchor="middle" font-size="10.5" fill="#3b5168">raw + metadata</text>

  <rect x="650" y="190" width="120" height="80" rx="10" fill="#eef0f2" stroke="#8a929b" stroke-width="2"/>
  <text x="710" y="224" text-anchor="middle" font-size="15" font-weight="700" fill="#1c2530">SILVER</text>
  <text x="710" y="244" text-anchor="middle" font-size="10.5" fill="#3b5168">clean · conform</text>

  <rect x="830" y="190" width="120" height="80" rx="10" fill="#faf3d6" stroke="#c8a72b" stroke-width="2"/>
  <text x="890" y="224" text-anchor="middle" font-size="15" font-weight="700" fill="#1c2530">GOLD</text>
  <text x="890" y="244" text-anchor="middle" font-size="10.5" fill="#3b5168">facts · dims · MVs</text>

  <rect x="1010" y="190" width="150" height="80" rx="10" fill="#f0eafb" stroke="#7a4fd0" stroke-width="2"/>
  <text x="1085" y="224" text-anchor="middle" font-size="14" font-weight="700" fill="#1c2530">AI/BI</text>
  <text x="1085" y="244" text-anchor="middle" font-size="12" fill="#1c2530">Dashboards</text>

  <!-- Arrows + labels -->
  <g stroke="#555" stroke-width="2" fill="none">
    <line x1="150" y1="230" x2="206" y2="230" marker-end="url(#arrow)"/>
    <line x1="400" y1="230" x2="466" y2="230" marker-end="url(#arrow)"/>
    <line x1="590" y1="230" x2="646" y2="230" marker-end="url(#arrow)"/>
    <line x1="770" y1="230" x2="826" y2="230" marker-end="url(#arrow)"/>
    <line x1="950" y1="230" x2="1006" y2="230" marker-end="url(#arrow)"/>
  </g>
  <g font-size="10.5" fill="#3b5168" text-anchor="middle">
    <text x="178" y="222">fs cp</text>
    <text x="433" y="214">Auto Loader</text>
    <text x="433" y="226">COPY INTO</text>
    <text x="433" y="238">read_files</text>
    <text x="618" y="214">expectations</text>
    <text x="618" y="226">dedupe</text>
    <text x="618" y="238">MERGE/SCD2</text>
    <text x="798" y="226">aggregations</text>
    <text x="978" y="220">serverless</text>
    <text x="978" y="232">SQL</text>
  </g>
</svg>
